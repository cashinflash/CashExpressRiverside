<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 88" width="360" height="88" role="img" aria-label="Cash Express Riverside">
  <title>Cash Express Riverside</title>
  <!-- White-on-navy variant — used in the dark footer where the navy
       wordmark of /images/logo.svg would blend into the background.
       Badge is transparent so the yellow sunburst + river waves sit
       directly on whatever dark background the footer provides. -->
  <!-- Badge: keep yellow sunburst + river waves (readable on navy) -->
  <g transform="translate(6,14)">
    <!-- soft outline so the badge still reads as a mark on navy -->
    <rect x="0" y="0" width="64" height="60" rx="14" fill="rgba(255,255,255,.06)" stroke="rgba(255,255,255,.16)" stroke-width="1"/>
    <!-- yellow sunburst -->
    <circle cx="32" cy="30" r="17" fill="#FFC52B"/>
    <!-- river waves -->
    <path d="M10 44 Q20 38 30 44 T50 44 T54 44" fill="none" stroke="#FFC52B" stroke-width="2.6" stroke-linecap="round" opacity=".95"/>
    <path d="M10 50 Q20 44 30 50 T50 50" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" opacity=".6"/>
    <!-- dollar inside the sunburst (dark navy reads well on yellow) -->
    <text x="32" y="36" text-anchor="middle" font-family="'Inter','Poppins','Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="900" fill="#14377C">$</text>
  </g>
  <!-- Wordmark — WHITE so it reads cleanly on the navy footer -->
  <g transform="translate(82,0)">
    <text x="0" y="40" font-family="'Inter','Poppins','Helvetica Neue',Arial,sans-serif" font-size="22" font-weight="800" fill="#FFFFFF" letter-spacing="-.3">Cash Express</text>
    <text x="0" y="66" font-family="'Inter','Poppins','Helvetica Neue',Arial,sans-serif" font-size="14" font-weight="600" fill="#FFFFFF" letter-spacing="6">RIVERSIDE</text>
    <rect x="0" y="72" width="52" height="3" rx="1.5" fill="#FFC52B"/>
  </g>
</svg>
