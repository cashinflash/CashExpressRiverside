<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80" role="img" aria-label="Cash Express Riverside">
  <title>Cash Express Riverside</title>
  <!-- CE monogram in rounded square -->
  <rect x="4" y="12" width="56" height="56" rx="10" fill="#1E3A5F"/>
  <rect x="4" y="12" width="56" height="56" rx="10" fill="none" stroke="#D4A84A" stroke-width="2"/>
  <text x="32" y="52" text-anchor="middle" font-family="'Poppins','Helvetica Neue',Arial,sans-serif" font-size="28" font-weight="800" fill="#FFFFFF" letter-spacing="-1">CE</text>
  <!-- Wordmark -->
  <text x="72" y="40" font-family="'Poppins','Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="700" fill="#1E3A5F" letter-spacing="1">CASH EXPRESS</text>
  <text x="72" y="62" font-family="'Poppins','Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="500" fill="#D4A84A" letter-spacing="3">RIVERSIDE</text>
</svg>
