<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 88" width="360" height="88" role="img" aria-label="Cash Express Riverside">
  <title>Cash Express Riverside</title>
  <defs>
    <linearGradient id="ce-gr" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C8102E"/>
      <stop offset="100%" stop-color="#9B0C24"/>
    </linearGradient>
  </defs>
  <!-- Mark: river-wave badge with a dollar bill resting above the current -->
  <g transform="translate(6,14)">
    <rect x="0" y="0" width="64" height="60" rx="14" fill="url(#ce-gr)"/>
    <!-- river waves -->
    <path d="M10 40 Q20 34 30 40 T50 40 T54 40" fill="none" stroke="#FFFFFF" stroke-width="2.4" stroke-linecap="round" opacity=".85"/>
    <path d="M10 46 Q20 40 30 46 T50 46" fill="none" stroke="#FFFFFF" stroke-width="2.4" stroke-linecap="round" opacity=".55"/>
    <!-- stylized dollar bill -->
    <rect x="14" y="14" width="36" height="20" rx="3" fill="#FFFFFF"/>
    <circle cx="32" cy="24" r="5.5" fill="none" stroke="#C8102E" stroke-width="1.4"/>
    <text x="32" y="27.5" text-anchor="middle" font-family="'Poppins','Helvetica Neue',Arial,sans-serif" font-size="9" font-weight="800" fill="#C8102E">$</text>
    <!-- speed marks -->
    <path d="M54 18 L60 18 M56 23 L62 23 M58 28 L64 28" stroke="#FFFFFF" stroke-width="1.6" stroke-linecap="round" opacity=".8"/>
  </g>
  <!-- Wordmark -->
  <g transform="translate(82,0)">
    <text x="0" y="40" font-family="'Poppins','Helvetica Neue',Arial,sans-serif" font-size="22" font-weight="800" fill="#1B365D" letter-spacing="-.3">Cash Express</text>
    <text x="0" y="66" font-family="'Poppins','Helvetica Neue',Arial,sans-serif" font-size="14" font-weight="600" fill="#C8102E" letter-spacing="6">RIVERSIDE</text>
    <rect x="0" y="72" width="36" height="3" rx="1.5" fill="#C8102E"/>
  </g>
</svg>
